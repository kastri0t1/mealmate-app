<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MealMate – Recipe Discovery</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- HEADER: logo + search bar -->
  <header class="header">
    <div class="header__logo">
      <i class="fa-solid fa-utensils"></i>
      <span>MealMate</span>
    </div>
    <div class="header__search">
      <input type="text" id="searchInput" placeholder="Search for a recipe..." />
      <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
  </header>
  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- TABS: Explore / Favorites -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="explore">Explore</button>
      <button class="tab-btn" data-tab="favorites">
        My Favorites <span id="favCount" class="badge">0</span>
      </button>
    </div>

    <!-- CATEGORY FILTER BUTTONS (filled by JS) -->
    <div class="categories" id="categoriesContainer"></div>

    <!-- SECTION TITLE -->
    <div class="section-title" id="sectionTitle">🔥 Popular Meals</div>

    <!-- MEALS GRID (filled by JS) -->
    <div class="meals-grid" id="mealsGrid"></div>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="emptyState" style="display:none">
      <i class="fa-solid fa-face-sad-tear"></i>
      <p>No meals found. Try a different search!</p>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>Made with <i class="fa-solid fa-heart"></i> by Kastriot &amp; Jetmir &middot; MealMate 2026 &middot;
    Powered by <a href="https://www.themealdb.com/" target="_blank">TheMealDB</a></p>
  </footer>

  <!-- MODAL POPUP (filled by JS) -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal__close" id="modalClose">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <div class="modal__content" id="modalContent"></div>
    </div>
  </div>

  <!-- SCRIPTS: jQuery first, then our app -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
